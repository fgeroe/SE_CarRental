services:
  # ===== PostgreSQL =====
  postgres:
    image: postgres:17-alpine
    container_name: carrental-db
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carrental}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===== Car Rental Service =====
  app:
    build: .
    container_name: carrental-app
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: